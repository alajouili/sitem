server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing (react-router-dom, per package.json).
    # Without this, refreshing the browser on e.g. /archives/42
    # would 404 — Nginx would look for a literal file at that path,
    # which doesn't exist; only index.html exists, and React Router
    # decides what to render based on the URL AFTER index.html and
    # its JS bundle load. try_files falls through to index.html for
    # any path that isn't a real static file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Option B from the architecture discussion: proxy /api/*
    # straight through to the backend's OWN Nginx container. From
    # the browser's perspective, everything is ONE origin — it
    # never knows or cares that a second container exists. This is
    # what eliminates CORS entirely and is the direct rehearsal for
    # Kubernetes Ingress path-based routing in Phase 5.
    #
    # "backend-nginx" is the Docker Compose SERVICE NAME we'll
    # define next in docker-compose.yml — Compose's internal DNS
    # resolves it automatically, same mechanism as fpm:9000 in the
    # backend's own default.conf.
    location /api/ {
        proxy_pass http://backend-nginx:80/api/;

        # Forward real client info to the backend — without these,
        # every request would appear to originate from the frontend
        # container's internal IP, which breaks anything relying on
        # the real client IP (rate limiting, audit logging per
        # Section 3's AuditLog model, abuse detection later).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Matches the backend's own client_max_body_size (25M) —
        # if this proxy's limit were lower, large .xlsx uploads
        # would be rejected HERE before ever reaching the backend,
        # producing a confusing error far from its actual cause.
        client_max_body_size 25M;
    }

    # Static asset caching. Vite's build output includes
    # content-hashed filenames (e.g. index-a1b2c3.js), so it's SAFE
    # to cache these aggressively — a new deploy produces NEW
    # filenames, so there's no risk of serving stale JS to a user.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}