name: Release

# Triggered ONLY when you push a tag matching v1.2.3 style — never
# on ordinary commits. This is a deliberate, human-initiated event:
# you decide when something is worth calling a real release,
# separate from the continuous build-on-every-push CI already
# covers. This is the actual distinction between "CI" (automatic,
# every push) and "release" (deliberate, versioned, human-triggered).
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # github.ref_name on a tag push is literally the tag itself,
      # e.g. "v1.2.0" — no extraction/parsing needed. This becomes
      # a THIRD tag alongside the existing latest/SHA tags from the
      # main CI workflow — all three coexist on the registry,
      # pointing at whichever builds they were assigned to.
      - name: Build and push ${{ matrix.name }} release image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sitem-${{ matrix.name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}