name: Security

# Separate workflow from CI on purpose: security scans have a
# different audience (you reviewing findings) and different
# failure semantics (a scan finding something isn't the same kind
# of "broken" as a failed build) — keeping them apart also means
# either can be modified without touching the other.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also run on a schedule, independent of any push. A dependency
  # that was safe last week can become vulnerable THIS week purely
  # because a new CVE was published — nothing about YOUR code
  # changed. Weekly is a reasonable cadence for a project this size.
  schedule:
    - cron: '0 6 * * 1'  # every Monday, 06:00 UTC

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Gitleaks needs full commit history, not just the latest
          # snapshot, to scan past commits too — the default
          # checkout only fetches the single most recent commit.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Checks composer.lock / package-lock.json against known-CVE
  # databases — catches vulnerabilities in code you didn't write,
  # inherited via a dependency (Phase 1 finding S5).
  # ============================================================
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          # Only fail on CRITICAL/HIGH — a brand-new project scanning
          # for the first time can surface dozens of LOW/MEDIUM
          # findings in transitive dependencies that are impractical
          # to fix immediately. Starting strict-but-reasonable avoids
          # the common failure mode of a security gate being so noisy
          # it gets disabled entirely out of frustration.
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ============================================================
  # Scans the ACTUAL BUILT IMAGE filesystem — OS packages (Alpine,
  # per our Dockerfiles), not just your app's direct dependencies.
  # Builds locally (push: false, load: true) rather than pulling
  # from the registry, so this runs independently of CI's publish
  # timing and works identically on a PR too (which never pushes).
  # ============================================================
  image-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (local only, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: sitem-${{ matrix.name }}:scan
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: sitem-${{ matrix.name }}:scan
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
