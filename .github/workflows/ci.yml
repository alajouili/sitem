name: CI

# WHEN this workflow runs — the trigger conditions.
# "push" to main: catches anything that lands on the main branch.
# "pull_request": runs the SAME checks on proposed changes BEFORE
# they're merged — this is what turns CI into a real gatekeeper
# rather than just an after-the-fact notification. A PR with a
# failing build should be visibly blocked, not silently merged
# and discovered broken later.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # JOB 1: Frontend lint — closes Phase 1 gap C3 ("eslint script
  # exists but isn't run automatically"). This finally makes it
  # automatic. A failing lint fails the whole workflow, which is
  # the point: code quality gates only work if they're enforced,
  # not optional.
  # ============================================================
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ============================================================
  # JOB 2: Build every Docker image — this is the big one. It
  # reuses the EXACT Dockerfiles from Phase 2, unmodified, run in
  # a clean environment with none of your local machine's state.
  # This is precisely the kind of check that would have caught
  # the Common.css and AppException case-mismatch bugs the moment
  # they were introduced, rather than discovering them mid-Docker
  # build weeks later.
  #
  # A "matrix" runs the same steps once per listed value — instead
  # of writing three nearly-identical jobs (one per image), we
  # define the differences as data and let GitHub Actions fan them
  # out into 3 parallel jobs automatically.
  # ============================================================
  build-images:
    runs-on: ubuntu-latest
    # Needed for the built-in GITHUB_TOKEN to have registry push
    # rights — without this explicit permissions block, some repo
    # configurations default the token to read-only and the push
    # step below fails with a 403, even with correct login.
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Only log in to the registry when we're actually going to
      # push (main branch only — see the `push:` condition below).
      # A PR from an external contributor shouldn't be able to
      # trigger a push to YOUR registry namespace, even if their
      # code builds successfully — that's a real supply-chain
      # consideration, not just tidiness.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Two tags per image, pushed together:
      #   - "latest"       → always points at the newest main build
      #   - the git SHA     → an immutable, permanent reference to
      #                        EXACTLY this commit's build. "latest"
      #                        alone is dangerous in production
      #                        (it silently changes meaning every
      #                        push); Kubernetes deployments in
      #                        Phase 5 will pin to the SHA tag
      #                        specifically, never to "latest".
      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sitem-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/sitem-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
