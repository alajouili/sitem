# NOT used day-to-day — docker-compose.yml (local builds) remains
# your main dev file. This is specifically for verifying that what
# CI published to the registry actually runs correctly, standing
# in as a manual rehearsal of "deployment" until Phase 5 gives us
# a real target (Kubernetes) to automate against.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  mariadb:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-archive_system}
      MARIADB_USER: ${DB_USERNAME:-archive_user}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend-net

  fpm:
    # Pulled from the registry, NOT built locally — this is the
    # entire point of this file. Replace :latest with a specific
    # SHA or version tag once you want to test an exact release
    # rather than always the newest main build.
    image: ghcr.io/alajouili/sitem-backend:latest
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-archive_system}
      DB_USERNAME: ${DB_USERNAME:-archive_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: 3600
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    volumes:
      - ./backend/public:/var/www/html/public
      - backend-storage:/var/www/html/storage
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - backend-net

  backend-nginx:
    image: ghcr.io/alajouili/sitem-nginx:latest
    restart: unless-stopped
    volumes:
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - fpm
    networks:
      - backend-net

  frontend:
    image: ghcr.io/alajouili/sitem-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend-nginx
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge

volumes:
  mariadb-data:
  backend-storage: